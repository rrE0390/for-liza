<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для Лизы</title>
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: radial-gradient(circle, #ffffff 0%, #fff0f3 60%, #ffdeee 100%);
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }

    /* Экран входа (Конверт) */
    #start-screen {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: #fff0f3; z-index: 10; display: flex; flex-direction: column;
      align-items: center; justify-content: center; transition: opacity 1s ease;
    }
    .envelope {
      width: 150px; height: 100px; background: #ff4d6d; position: relative;
      border-radius: 0 0 8px 8px; cursor: pointer; box-shadow: 0 10px 30px rgba(255,77,109,0.3);
      animation: float 3s ease-in-out infinite; transition: transform 0.3s;
    }
    .envelope:hover { transform: scale(1.05); }
    .envelope:before {
      content: ""; position: absolute; top: -70px; left: 0;
      border-width: 0 75px 70px 75px; border-style: solid;
      border-color: transparent transparent #ff4d6d transparent;
    }
    .envelope-text {
      margin-top: 30px; font-size: 20px; color: #ff4d6d; font-weight: bold;
    }

    /* Главный контент (Сайт) */
    #main-content {
      opacity: 0; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; z-index: 2; transition: opacity 1.5s ease;
    }

    /* 3D Сцена сердца */
    .scene {
      width: 160px; height: 160px; perspective: 800px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
    }
    .heart-3d {
      width: 80px; height: 80px; transform-style: preserve-3d;
      animation: spin 8s linear infinite, pulse 1.4s ease-in-out infinite;
    }
    .heart-layer {
      position: absolute; width: 80px; height: 80px; transform: rotate(-45deg);
      border-radius: 4px; background: linear-gradient(135deg, #ffccd5 0%, #ff4d6d 40%, #c71585 100%);
      box-shadow: 0 0 20px rgba(255, 77, 109, 0.3);
    }
    .heart-layer:before, .heart-layer:after {
      content: ""; position: absolute; width: 80px; height: 80px; background: inherit; border-radius: 50%;
    }
    .heart-layer:before { top: -40px; left: 0; }
    .heart-layer:after { left: 40px; top: 0; }

    /* Наслоение для 3D объема */
    .l-1 { transform: translateZ(-10px) rotate(-45deg) scale(0.95); filter: brightness(0.8); }
    .l-2 { transform: translateZ(-5px) rotate(-45deg); }
    .l-3 { transform: translateZ(0px) rotate(-45deg); }
    .l-4 { transform: translateZ(5px) rotate(-45deg); background: linear-gradient(135deg, #ffffff 0%, #ff758f 50%, #ff4d6d 100%); }
    .l-5 { transform: translateZ(10px) rotate(-45deg) scale(0.95); }

    /* Текст */
    .title {
      font-size: 32px; font-weight: 800; text-transform: uppercase;
      background: linear-gradient(45deg, #ff4d6d, #c71585);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 25px; letter-spacing: 1px;
    }

    /* Блок счетчика */
    .counter-box {
      background: rgba(255, 255, 255, 0.6); padding: 20px 30px;
      border-radius: 20px; box-shadow: 0 10px 30px rgba(255, 77, 109, 0.1);
      backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.8);
    }
    .counter-title { font-size: 16px; color: #ff758f; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
    .timer { display: flex; gap: 15px; justify-content: center; }
    .time-unit { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
    .time-num { font-size: 28px; font-weight: 800; color: #ff4d6d; }
    .time-label { font-size: 11px; color: #a3a3a3; text-transform: uppercase; margin-top: 20px;}

    /* Падающие лепестки */
    .petal {
      position: absolute; background: #ffb3c1; border-radius: 150% 0 150% 150%;
      opacity: 0.7; pointer-events: none; animation: fadeRain 5s linear infinite; z-index: 1;
    }

    /* Анимации */
    @keyframes spin { 0% { transform: rotateY(0deg) rotateX(10deg); } 100% { transform: rotateY(360deg) rotateX(10deg); } }
    @keyframes pulse { 0%, 100% { max-width: 100%; } 50% { transform: scale(1.12) rotateY(inherit) rotateX(12deg); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes fadeRain {
      0% { transform: translateY(-50px) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      100% { transform: translateY(105vh) translateX(100px) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Фоновая музыка (Нежная инструментальная мелодия) -->
  <audio id="bg-music" loop>
    <source src="https://soundhelix.com" type="audio/mp3">
  </audio>

  <!-- Экран с конвертом -->
  <div id="start-screen" onclick="openEnvelope()">
    <div class="envelope"></div>
    <div class="envelope-text">Для Лизы. Нажми, чтобы открыть ❤️</div>
  </div>

  <!-- Главное признание -->
  <div id="main-content">
    <div class="scene">
      <div class="heart-3d">
        <div class="heart-layer l-1"></div>
        <div class="heart-layer l-2"></div>
        <div class="heart-layer l-3"></div>
        <div class="heart-layer l-4"></div>
        <div class="heart-layer l-5"></div>
      </div>
    </div>
    
    <div class="title">Я Люблю Тебя, Лиза</div>

    <div class="counter-box">
      <div class="counter-title">Мы вместе уже:</div>
      <div class="timer">
        <div class="time-unit"><span class="time-num" id="days">00</span><span class="time-label">дней</span></div>
        <div class="time-unit"><span class="time-num" id="hours">00</span><span class="time-label">часов</span></div>
        <div class="time-unit"><span class="time-num" id="minutes">00</span><span class="time-label">минут</span></div>
        <div class="time-unit"><span class="time-num" id="seconds">00</span><span class="time-label">секунд</span></div>
      </div>
    </div>
  </div>

  <script>
    // Дата начала отношений: 13.02.2026 в 23:46:22
    const startDate = new Date(2026, 1, 13, 23, 46, 22).getTime(); 

    function updateCounter() {
      const now = new Date().getTime();
      const diff = now - startDate;

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').innerText = d < 10 ? '0' + d : d;
      document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
      document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
      document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;
    }

    function openEnvelope() {
      document.getElementById('start-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-content').style.opacity = '1';
        // Включаем музыку
        const music = document.getElementById('bg-music');
        music.play().catch(e => console.log("Музыка заблокирована браузером"));
        // Запуск дождя из лепестков
        setInterval(createPetal, 300);
      }, 1000);
    }

    function createPetal() {
      const petal = document.createElement('div');
      petal.classList.add('petal');
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.width = Math.random() * 15 + 10 + 'px';
      petal.style.height = petal.style.width;
      petal.style.animationDuration = Math.random() * 3 + 3 + 's';
      document.body.appendChild(petal);
      setTimeout(() => petal.remove(), 5000);
    }

    setInterval(updateCounter, 1000);
    updateCounter();
  </script>
</body>
</html>
